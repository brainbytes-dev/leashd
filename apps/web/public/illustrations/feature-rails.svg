<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Multi-rail, BTC-first">
  <rect width="400" height="300" fill="#18181b"/>
  <!-- lightning bolt source (top left) -->
  <g transform="translate(56 70)">
    <path d="M22 0 L4 30 H18 L10 56 L36 22 H22 Z" fill="#10b981"/>
    <text x="-2" y="76" fill="#6b7280" font-family="monospace" font-size="11">lightning</text>
  </g>
  <!-- stablecoin coin source (bottom left) -->
  <g transform="translate(60 190)">
    <circle cx="16" cy="16" r="18" fill="none" stroke="#3f3f46" stroke-width="2"/>
    <text x="16" y="22" fill="#f6f7ff" font-family="monospace" font-size="16" text-anchor="middle">$</text>
    <text x="-4" y="56" fill="#6b7280" font-family="monospace" font-size="11">stablecoin</text>
  </g>
  <!-- routes into checkpoint -->
  <g stroke="#3f3f46" stroke-width="2" fill="none">
    <path d="M104 92 C 160 110, 160 130, 196 150"/>
    <path d="M104 206 C 160 190, 160 170, 196 150"/>
  </g>
  <!-- green checkpoint gate -->
  <g transform="translate(196 118)">
    <path d="M32 0 L64 12 V 36 C 64 52, 48 62, 32 64 C 16 62, 0 52, 0 36 V 12 Z" fill="#000000" stroke="#10b981" stroke-width="3"/>
    <path d="M18 32 l10 12 l20 -24" stroke="#10b981" stroke-width="3" fill="none"/>
  </g>
  <text x="186" y="200" fill="#6b7280" font-family="monospace" font-size="11">one checkpoint</text>
  <!-- single settled output -->
  <g stroke="#10b981" stroke-width="2" fill="none">
    <path d="M262 150 H 344"/>
    <path d="M336 144 L344 150 L336 156"/>
  </g>
  <circle cx="290" cy="150" r="4" fill="#10b981"/>
  <circle cx="312" cy="150" r="4" fill="#10b981"/>
  <text x="300" y="134" fill="#6b7280" font-family="monospace" font-size="11" text-anchor="middle">settle</text>
</svg>
