<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Multi-rail, BTC-first">
  <!-- lightning bolt source (top left) -->
  <g transform="translate(56 76)">
    <path d="M22 0 L4 30 H18 L10 56 L36 22 H22 Z" fill="#10b981" fill-opacity="0.2" stroke="#10b981" stroke-width="2.5" stroke-linejoin="round"/>
  </g>

  <!-- stablecoin coin source (bottom left) -->
  <g transform="translate(56 184)">
    <circle cx="20" cy="20" r="20" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="2.5"/>
    <path d="M20 8 v24 M13 14 h10 a4 4 0 0 1 0 8 h-10 M13 22 h11 a4 4 0 0 1 0 8 h-11" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- routes into checkpoint -->
  <g stroke="#64748b" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M104 100 C 160 116, 160 134, 196 150"/>
    <path d="M104 204 C 160 188, 160 168, 196 150"/>
  </g>

  <!-- green checkpoint shield -->
  <g transform="translate(196 116)">
    <path d="M32 0 L64 12 V 38 C 64 54, 48 64, 32 68 C 16 64, 0 54, 0 38 V 12 Z" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="3"/>
    <path d="M18 32 l10 12 l20 -24" stroke="#10b981" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- single settled output -->
  <g stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M262 150 H 344"/>
    <path d="M336 144 L344 150 L336 156"/>
  </g>
  <circle cx="288" cy="150" r="4" fill="#10b981"/>
  <circle cx="310" cy="150" r="4" fill="#10b981"/>
</svg>
