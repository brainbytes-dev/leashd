<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Signed audit trail">
  <!-- terminal window -->
  <rect x="50" y="50" width="300" height="200" rx="10" fill="#10b981" fill-opacity="0.05" stroke="#64748b" stroke-width="2.5"/>
  <path d="M50 78 H350" stroke="#64748b" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="68" cy="64" r="4" fill="none" stroke="#64748b" stroke-width="2"/>
  <circle cx="82" cy="64" r="4" fill="none" stroke="#64748b" stroke-width="2"/>
  <circle cx="96" cy="64" r="4" fill="none" stroke="#64748b" stroke-width="2"/>

  <!-- log rows -->
  <!-- allow -->
  <circle cx="100" cy="104" r="9" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="2"/>
  <path d="M96 104 l3 4 l6 -8" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="120" y="100" width="170" height="8" rx="4" fill="#10b981" fill-opacity="0.4"/>
  <rect x="120" y="100" width="92" height="8" rx="4" fill="#10b981"/>
  <!-- deny -->
  <circle cx="100" cy="134" r="9" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-width="2"/>
  <path d="M96 130 l8 8 m0 -8 l-8 8" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="120" y="130" width="130" height="8" rx="4" fill="#ef4444" fill-opacity="0.45"/>
  <!-- allow -->
  <circle cx="100" cy="164" r="9" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="2"/>
  <path d="M96 164 l3 4 l6 -8" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="120" y="160" width="180" height="8" rx="4" fill="#10b981" fill-opacity="0.7"/>
  <!-- allow -->
  <circle cx="100" cy="194" r="9" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="2"/>
  <path d="M96 194 l3 4 l6 -8" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="120" y="190" width="120" height="8" rx="4" fill="#10b981" fill-opacity="0.4"/>

  <!-- append-only chain links on left edge -->
  <g stroke="#64748b" stroke-width="2.5" fill="none">
    <path d="M78 113 V 125"/>
    <path d="M78 143 V 155"/>
    <path d="M78 173 V 185"/>
  </g>
  <circle cx="78" cy="104" r="4" fill="none" stroke="#64748b" stroke-width="2"/>
  <circle cx="78" cy="134" r="4" fill="none" stroke="#64748b" stroke-width="2"/>
  <circle cx="78" cy="164" r="4" fill="none" stroke="#64748b" stroke-width="2"/>
  <circle cx="78" cy="194" r="4" fill="none" stroke="#64748b" stroke-width="2"/>

  <!-- signed seal -->
  <rect x="276" y="216" width="60" height="24" rx="6" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="2"/>
  <path d="M286 228 l4 4 7 -9" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="306" y="225" width="22" height="6" rx="3" fill="#10b981" fill-opacity="0.6"/>
</svg>
