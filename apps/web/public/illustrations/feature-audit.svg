<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Signed audit trail">
  <rect width="400" height="300" fill="#18181b"/>
  <!-- terminal window -->
  <rect x="50" y="50" width="300" height="200" rx="10" fill="#000000" stroke="#3f3f46" stroke-width="2"/>
  <rect x="50" y="50" width="300" height="28" rx="10" fill="#18181b" stroke="#3f3f46" stroke-width="2"/>
  <circle cx="68" cy="64" r="4" fill="#3f3f46"/>
  <circle cx="82" cy="64" r="4" fill="#3f3f46"/>
  <circle cx="96" cy="64" r="4" fill="#3f3f46"/>
  <text x="300" y="68" fill="#6b7280" font-family="monospace" font-size="11" text-anchor="end">audit.log</text>
  <!-- log rows -->
  <g font-family="monospace" font-size="12">
    <!-- allow -->
    <circle cx="78" cy="104" r="8" fill="none" stroke="#10b981" stroke-width="2"/>
    <path d="M74 104 l3 4 l6 -8" stroke="#10b981" stroke-width="2" fill="none"/>
    <rect x="98" y="100" width="150" height="8" rx="4" fill="#10b981" opacity="0.85"/>
    <rect x="98" y="100" width="90" height="8" rx="4" fill="#10b981"/>
    <!-- deny -->
    <circle cx="78" cy="134" r="8" fill="none" stroke="#ef4444" stroke-width="2"/>
    <path d="M75 131 l6 6 m0 -6 l-6 6" stroke="#ef4444" stroke-width="2"/>
    <rect x="98" y="130" width="120" height="8" rx="4" fill="#3f3f46"/>
    <!-- allow -->
    <circle cx="78" cy="164" r="8" fill="none" stroke="#10b981" stroke-width="2"/>
    <path d="M74 164 l3 4 l6 -8" stroke="#10b981" stroke-width="2" fill="none"/>
    <rect x="98" y="160" width="170" height="8" rx="4" fill="#10b981"/>
    <!-- allow -->
    <circle cx="78" cy="194" r="8" fill="none" stroke="#10b981" stroke-width="2"/>
    <path d="M74 194 l3 4 l6 -8" stroke="#10b981" stroke-width="2" fill="none"/>
    <rect x="98" y="190" width="110" height="8" rx="4" fill="#10b981" opacity="0.85"/>
  </g>
  <!-- append-only chain link on left edge -->
  <g stroke="#3f3f46" stroke-width="2" fill="none">
    <path d="M62 112 V 124"/>
    <path d="M62 142 V 154"/>
    <path d="M62 172 V 184"/>
  </g>
  <text x="50" y="238" fill="#6b7280" font-family="monospace" font-size="11">append-only - signed</text>
</svg>
