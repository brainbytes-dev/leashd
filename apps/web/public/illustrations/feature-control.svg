<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Scoped credentials and kill-switch">
  <!-- collar / leash ring -->
  <circle cx="130" cy="120" r="52" fill="#10b981" fill-opacity="0.06" stroke="#64748b" stroke-width="10"/>
  <circle cx="130" cy="120" r="52" fill="none" stroke="#10b981" stroke-width="10" stroke-dasharray="64 260" stroke-linecap="round"/>
  <!-- D-ring -->
  <circle cx="130" cy="66" r="9" fill="none" stroke="#64748b" stroke-width="3"/>
  <!-- leash line to key -->
  <path d="M130 57 C 130 28, 240 28, 250 58" stroke="#64748b" stroke-width="3" fill="none"/>

  <!-- scoped key -->
  <g transform="translate(250 68)">
    <circle cx="0" cy="0" r="14" fill="none" stroke="#10b981" stroke-width="3"/>
    <circle cx="0" cy="0" r="4" fill="none" stroke="#10b981" stroke-width="2"/>
    <rect x="12" y="-3" width="46" height="6" rx="2" fill="#10b981" fill-opacity="0.3" stroke="#10b981" stroke-width="2"/>
    <rect x="46" y="3" width="6" height="11" rx="1" fill="#10b981"/>
    <rect x="34" y="3" width="6" height="9" rx="1" fill="#10b981"/>
  </g>

  <!-- scoped permission lines -->
  <g>
    <rect x="70" y="198" width="16" height="16" rx="3" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="2"/>
    <path d="M74 206 l3 4 l6 -8" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="96" y="202" width="120" height="8" rx="4" fill="#64748b" fill-opacity="0.5"/>
    <rect x="70" y="224" width="16" height="16" rx="3" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="2"/>
    <path d="M74 232 l3 4 l6 -8" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="96" y="228" width="88" height="8" rx="4" fill="#64748b" fill-opacity="0.5"/>
  </g>

  <!-- kill-switch toggle (green = armed) -->
  <g transform="translate(250 206)">
    <rect x="0" y="0" width="84" height="36" rx="18" fill="#10b981" fill-opacity="0.14" stroke="#10b981" stroke-width="2.5"/>
    <circle cx="62" cy="18" r="13" fill="#10b981" fill-opacity="0.35" stroke="#10b981" stroke-width="2.5"/>
    <line x1="62" y1="12" x2="62" y2="24" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
