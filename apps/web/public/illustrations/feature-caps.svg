<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Budget caps">
  <!-- wallet / meter body -->
  <rect x="70" y="80" width="200" height="150" rx="12" fill="#10b981" fill-opacity="0.07" stroke="#64748b" stroke-width="2.5"/>
  <path d="M70 112 H270" stroke="#64748b" stroke-width="2" stroke-opacity="0.6"/>
  <circle cx="246" cy="155" r="9" fill="none" stroke="#64748b" stroke-width="2.5"/>
  <circle cx="246" cy="155" r="3" fill="#64748b"/>

  <!-- sats flow bars rising toward the cap -->
  <rect x="96" y="190" width="20" height="26" rx="3" fill="#10b981" fill-opacity="0.18" stroke="#10b981" stroke-width="2"/>
  <rect x="124" y="172" width="20" height="44" rx="3" fill="#10b981" fill-opacity="0.18" stroke="#10b981" stroke-width="2"/>
  <rect x="152" y="152" width="20" height="64" rx="3" fill="#10b981" fill-opacity="0.18" stroke="#10b981" stroke-width="2"/>
  <!-- bar that hits the cap -->
  <rect x="180" y="138" width="20" height="78" rx="3" fill="#10b981" fill-opacity="0.32" stroke="#10b981" stroke-width="2.5"/>

  <!-- denied overflow (red, above the dashed cap) -->
  <rect x="208" y="108" width="20" height="24" rx="3" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 4"/>
  <path d="M212 114 l12 12 m0 -12 l-12 12" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>

  <!-- green limit / cap line (dashed) -->
  <line x1="84" y1="134" x2="256" y2="134" stroke="#10b981" stroke-width="3" stroke-dasharray="9 7" stroke-linecap="round"/>
  <!-- limit tag -->
  <line x1="256" y1="134" x2="292" y2="134" stroke="#10b981" stroke-width="2.5"/>
  <rect x="292" y="120" width="56" height="28" rx="6" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="2"/>
  <path d="M304 134 l6 6 12 -14" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- sats coin feeding the meter (amber) -->
  <circle cx="322" cy="212" r="26" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="2.5"/>
  <path d="M322 197 v30 M313 205 h12 a5 5 0 0 1 0 9 h-12 M313 214 h13 a5 5 0 0 1 0 9 h-13" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M296 212 H272" stroke="#64748b" stroke-width="2.5" stroke-dasharray="5 5"/>
</svg>
