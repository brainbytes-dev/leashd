<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Budget caps">
  <rect width="400" height="300" fill="#18181b"/>
  <!-- wallet body -->
  <rect x="70" y="90" width="200" height="130" rx="10" fill="#000000" stroke="#3f3f46" stroke-width="2"/>
  <rect x="70" y="90" width="200" height="34" rx="10" fill="#18181b" stroke="#3f3f46" stroke-width="2"/>
  <circle cx="248" cy="155" r="12" fill="#18181b" stroke="#10b981" stroke-width="2"/>
  <circle cx="248" cy="155" r="4" fill="#10b981"/>
  <!-- meter track -->
  <rect x="92" y="150" width="120" height="14" rx="7" fill="#18181b" stroke="#3f3f46" stroke-width="2"/>
  <!-- filled to cap -->
  <rect x="94" y="152" width="72" height="10" rx="5" fill="#10b981"/>
  <!-- cap marker -->
  <line x1="172" y1="142" x2="172" y2="172" stroke="#f6f7ff" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="156" y="136" fill="#6b7280" font-family="monospace" font-size="11">CAP</text>
  <!-- sats flow arrows above -->
  <g stroke="#10b981" stroke-width="2" fill="none">
    <path d="M120 70 H300"/>
    <path d="M292 64 L300 70 L292 76"/>
  </g>
  <circle cx="140" cy="70" r="4" fill="#10b981"/>
  <circle cx="170" cy="70" r="4" fill="#10b981"/>
  <circle cx="200" cy="70" r="4" fill="#10b981"/>
  <!-- denied beyond cap -->
  <circle cx="320" cy="155" r="14" fill="#18181b" stroke="#ef4444" stroke-width="2"/>
  <path d="M314 149 L326 161 M326 149 L314 161" stroke="#ef4444" stroke-width="2"/>
  <text x="90" y="200" fill="#6b7280" font-family="monospace" font-size="12">spend &lt;= limit</text>
</svg>
