<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="How leashd works: agent to policy gate to settlement to audit">

  <!-- dotted world map (stylized, slate low opacity) -->
  <g fill="#64748b" fill-opacity="0.35">
    <!-- americas -->
    <circle cx="180" cy="150" r="3"/><circle cx="200" cy="160" r="3"/><circle cx="195" cy="180" r="3"/><circle cx="215" cy="195" r="3"/><circle cx="205" cy="215" r="3"/><circle cx="225" cy="230" r="3"/><circle cx="240" cy="255" r="3"/><circle cx="230" cy="280" r="3"/><circle cx="250" cy="300" r="3"/><circle cx="245" cy="325" r="3"/><circle cx="160" cy="170" r="3"/><circle cx="175" cy="200" r="3"/>
    <!-- europe / africa -->
    <circle cx="560" cy="140" r="3"/><circle cx="580" cy="150" r="3"/><circle cx="600" cy="145" r="3"/><circle cx="575" cy="170" r="3"/><circle cx="595" cy="185" r="3"/><circle cx="585" cy="210" r="3"/><circle cx="600" cy="235" r="3"/><circle cx="590" cy="260" r="3"/><circle cx="605" cy="285" r="3"/><circle cx="595" cy="310" r="3"/><circle cx="620" cy="160" r="3"/><circle cx="615" cy="200" r="3"/>
    <!-- asia / oceania -->
    <circle cx="800" cy="150" r="3"/><circle cx="830" cy="160" r="3"/><circle cx="860" cy="155" r="3"/><circle cx="890" cy="170" r="3"/><circle cx="850" cy="185" r="3"/><circle cx="880" cy="200" r="3"/><circle cx="910" cy="195" r="3"/><circle cx="940" cy="210" r="3"/><circle cx="900" cy="240" r="3"/><circle cx="930" cy="260" r="3"/><circle cx="960" cy="300" r="3"/><circle cx="820" cy="190" r="3"/><circle cx="1000" cy="180" r="3"/><circle cx="1020" cy="220" r="3"/>
  </g>

  <!-- AGENT node (left) -->
  <g transform="translate(70 200)">
    <rect x="0" y="0" width="170" height="120" rx="12" fill="#10b981" fill-opacity="0.05" stroke="#64748b" stroke-width="2.5"/>
    <circle cx="42" cy="46" r="20" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="3"/>
    <circle cx="35" cy="42" r="3" fill="#10b981"/><circle cx="49" cy="42" r="3" fill="#10b981"/>
    <path d="M34 54 q8 6 16 0" stroke="#10b981" stroke-width="3" fill="none" stroke-linecap="round"/>
    <rect x="78" y="34" width="74" height="8" rx="4" fill="#64748b" fill-opacity="0.6"/>
    <rect x="78" y="50" width="54" height="7" rx="3.5" fill="#64748b" fill-opacity="0.4"/>
    <rect x="18" y="90" width="134" height="8" rx="4" fill="#10b981" fill-opacity="0.3"/>
  </g>

  <!-- arrow 1: agent -> gate -->
  <g stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M240 260 H 470"/>
    <path d="M462 252 L470 260 L462 268"/>
  </g>
  <g transform="translate(330 238)">
    <circle cx="0" cy="0" r="13" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="2"/>
    <text x="0" y="5" fill="#10b981" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">1</text>
  </g>

  <!-- CENTRAL policy gate shield -->
  <g transform="translate(470 160)">
    <path d="M120 0 L240 40 V 130 C 240 200, 180 240, 120 256 C 60 240, 0 200, 0 130 V 40 Z" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="3"/>
    <path d="M70 128 l34 40 l66 -82" stroke="#10b981" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="78" y="180" width="84" height="9" rx="4.5" fill="#10b981" fill-opacity="0.45"/>
    <rect x="98" y="200" width="44" height="7" rx="3.5" fill="#64748b" fill-opacity="0.5"/>
  </g>

  <!-- arrow 2: gate -> rails -->
  <g stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M710 230 H 900"/>
    <path d="M892 222 L900 230 L892 238"/>
    <path d="M710 290 H 900"/>
    <path d="M892 282 L900 290 L892 298"/>
  </g>
  <g transform="translate(790 230)">
    <circle cx="0" cy="0" r="13" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="2"/>
    <text x="0" y="5" fill="#10b981" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">2</text>
  </g>

  <!-- rails panel -->
  <g transform="translate(900 180)">
    <!-- lightning rail -->
    <rect x="0" y="0" width="230" height="50" rx="8" fill="#10b981" fill-opacity="0.05" stroke="#64748b" stroke-width="2.5"/>
    <path d="M30 12 L16 32 H26 L20 48 L40 24 H30 Z" fill="#10b981" fill-opacity="0.25" stroke="#10b981" stroke-width="2" stroke-linejoin="round"/>
    <rect x="58" y="20" width="140" height="9" rx="4.5" fill="#64748b" fill-opacity="0.55"/>
    <!-- cashu ecash -->
    <rect x="0" y="60" width="230" height="50" rx="8" fill="#10b981" fill-opacity="0.05" stroke="#64748b" stroke-width="2.5"/>
    <circle cx="28" cy="85" r="14" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="2.5"/>
    <path d="M33 80 a8 8 0 1 0 0 10" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="58" y="80" width="120" height="9" rx="4.5" fill="#64748b" fill-opacity="0.55"/>
    <!-- stablecoin -->
    <rect x="0" y="120" width="230" height="50" rx="8" fill="#f59e0b" fill-opacity="0.05" stroke="#64748b" stroke-width="2.5"/>
    <circle cx="28" cy="145" r="14" fill="#f59e0b" fill-opacity="0.12" stroke="#f59e0b" stroke-width="2.5"/>
    <path d="M28 137 v16 M23 141 h7 a3 3 0 0 1 0 6 h-7 M23 147 h8 a3 3 0 0 1 0 6 h-8" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="58" y="140" width="130" height="9" rx="4.5" fill="#64748b" fill-opacity="0.55"/>
  </g>

  <!-- arrow 3: gate -> audit (down) -->
  <g stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M590 416 V 450 H 470"/>
    <path d="M478 442 L470 450 L478 458"/>
  </g>
  <g transform="translate(590 432)">
    <circle cx="0" cy="0" r="13" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="2"/>
    <text x="0" y="5" fill="#10b981" font-family="monospace" font-size="16" text-anchor="middle" font-weight="bold">3</text>
  </g>

  <!-- audit-log panel (bottom) -->
  <g transform="translate(150 430)">
    <rect x="0" y="0" width="300" height="74" rx="10" fill="#10b981" fill-opacity="0.05" stroke="#64748b" stroke-width="2.5"/>
    <rect x="14" y="14" width="120" height="8" rx="4" fill="#64748b" fill-opacity="0.55"/>
    <!-- allow row -->
    <circle cx="22" cy="44" r="7" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="2"/>
    <path d="M19 44 l2 3 l5 -6" stroke="#10b981" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="40" y="40" width="160" height="8" rx="4" fill="#10b981" fill-opacity="0.5"/>
    <!-- deny row -->
    <circle cx="22" cy="62" r="7" fill="#ef4444" fill-opacity="0.12" stroke="#ef4444" stroke-width="2"/>
    <path d="M19 59 l6 6 m0 -6 l-6 6" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
    <rect x="40" y="58" width="120" height="8" rx="4" fill="#ef4444" fill-opacity="0.45"/>
    <!-- signed seal -->
    <rect x="244" y="36" width="44" height="22" rx="6" fill="#10b981" fill-opacity="0.12" stroke="#10b981" stroke-width="2"/>
    <path d="M254 47 l4 4 7 -9" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- flow caption bar (top center) -->
  <g transform="translate(490 28)">
    <rect x="0" y="0" width="24" height="9" rx="4.5" fill="#10b981" fill-opacity="0.6"/>
    <rect x="34" y="0" width="56" height="9" rx="4.5" fill="#64748b" fill-opacity="0.5"/>
    <rect x="110" y="0" width="40" height="9" rx="4.5" fill="#10b981" fill-opacity="0.45"/>
    <rect x="170" y="0" width="50" height="9" rx="4.5" fill="#64748b" fill-opacity="0.5"/>
  </g>
</svg>
