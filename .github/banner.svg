<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <rect width="1280" height="320" fill="#18181b"/>
  <rect x="0" y="0" width="1280" height="320" fill="none" stroke="#3f3f46" stroke-width="1"/>

  <!-- wordmark -->
  <text x="80" y="118" fill="#f6f7ff" font-size="64" font-weight="700" letter-spacing="-1">leashd</text>
  <rect x="318" y="74" width="22" height="52" fill="#10b981"/>

  <!-- tagline -->
  <text x="82" y="162" fill="#6b7280" font-size="24" font-weight="400">Give your AI agents money. Keep them on a leash.</text>

  <!-- terminal / audit motif -->
  <rect x="80" y="200" width="1120" height="84" rx="8" fill="#000000" stroke="#3f3f46" stroke-width="1"/>
  <circle cx="100" cy="218" r="5" fill="#3f3f46"/>
  <circle cx="118" cy="218" r="5" fill="#3f3f46"/>
  <circle cx="136" cy="218" r="5" fill="#3f3f46"/>
  <text x="100" y="252" fill="#f6f7ff" font-size="17">agent:research-bot  pay 50,000 sat → api.foo.com  <tspan fill="#ef4444" font-weight="700">✗ DENIED</tspan>  <tspan fill="#6b7280">daily cap 20,000 sat exceeded</tspan></text>
  <text x="100" y="276" fill="#f6f7ff" font-size="17">agent:research-bot  pay 800 sat → api.foo.com     <tspan fill="#10b981" font-weight="700">✓ ALLOWED</tspan>  <tspan fill="#6b7280">within policy</tspan></text>

  <!-- accent corner tag -->
  <text x="1200" y="118" text-anchor="end" fill="#10b981" font-size="15" font-weight="700">non-custodial</text>
  <text x="1200" y="140" text-anchor="end" fill="#6b7280" font-size="15">spend governance for AI agents</text>
</svg>
